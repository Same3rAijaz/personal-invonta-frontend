name: Sync to Personal Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync to Target Repository
        env:
          TARGET_REPO_URL: "https://Same3rAijaz:${{ secrets.PERSONAL_GITHUB_TOKEN }}@github.com/Same3rAijaz/personal-invonta-frontend.git"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add target "$TARGET_REPO_URL"
          # Remove GitHub workflows so they don't sync to the personal repo
          rm -rf .github/workflows
          git add .github/workflows
          git commit -m "chore: remove workflows for sync" || true
          git push target main:main --force
